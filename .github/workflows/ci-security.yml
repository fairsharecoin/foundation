name: ci-security

on:
  pull_request:
  push:
    branches: [ master, main ]

jobs:
  build-test-preflight-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Preflight (staging)
        run: npm run preflight:staging

      - name: Preflight (prod)
        run: npm run preflight:prod

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Secret-like pattern scan
        run: |
          if grep -RInE \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=docs \
            --exclude-dir=.github \
            --exclude=package-lock.json \
            --exclude='*.example' \
            '(AKIA[0-9A-Z]{16}|BEGIN RSA PRIVATE KEY|BEGIN OPENSSH PRIVATE KEY|BEGIN EC PRIVATE KEY|api[_-]?key\s*[:=]|secret\s*[:=]|token\s*[:=]\s*["\x27][A-Za-z0-9_\-]{20,}|password\s*[:=]\s*["\x27][^"\x27]{8,})' \
            src scripts test . ; then
            echo 'Potential secret-like strings found.'
            exit 1
          fi
          echo 'No obvious hardcoded secrets found.'
